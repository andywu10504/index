<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>我的小工具箱｜Home</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" rel="stylesheet">

  <link href="css/common.css" rel="stylesheet">
  <link href="css/index.css" rel="stylesheet">
</head>

<body data-page="home">
  <div id="navbarContainer"></div>

  <main>
    <section class="home-hero">
      <div class="container text-center">
        <span class="hero-badge">
          <i class="fa-solid fa-sparkles me-1"></i>
          Personal Web Tools
        </span>

        <h1 class="home-title">個人網頁小工具入口</h1>

        <p class="home-text">
          整理自己製作的網頁小工具，方便快速開啟、測試與使用。
        </p>
      </div>
    </section>

    <section class="container tool-section">
      <div class="section-header">
        <h2>常用工具</h2>
        <p>工具卡片由 JavaScript 動態產生，後續新增工具只需要修改 data/tools.js。</p>
      </div>

      <div class="row g-4" id="homeToolCardContainer"></div>
    </section>
  </main>

  <footer class="app-footer">
    <div class="container text-center">
      <span>© 我的小工具箱｜吳宇樺</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="data/tools.js"></script>
  <script src="js/common.js"></script>
  <script src="js/index.js"></script>
</body>
</html>
